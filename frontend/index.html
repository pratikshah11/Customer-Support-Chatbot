<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Chat | AI-Powered Assistant</title>
  <meta name="description" content="Get instant help from our AI-powered customer support assistant. Available 24/7 to answer your questions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <span class="brand-name">SupportAI</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn active" id="btn-new-chat" onclick="startNewChat()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Chat
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="status-badge" id="connection-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Connecting...</span>
        </div>
        <p class="sidebar-version">Powered by Meta Llama 3.1</p>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">

      <!-- Header -->
      <header class="chat-header">
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="chat-header-info">
          <h1 class="chat-title">Customer Support</h1>
          <p class="chat-subtitle">AI-powered assistant</p>
        </div>
        <div class="header-actions">
          <button class="icon-btn" onclick="clearChat()" title="Clear chat" id="btn-clear-chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Messages -->
      <div class="messages-container" id="messages-container" role="log" aria-live="polite" aria-label="Chat messages">

        <!-- Welcome screen shown when no messages exist -->
        <div class="welcome-screen" id="welcome-screen">
          <div class="welcome-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <h2>How can I help you today?</h2>
          <p>Ask me anything — I'm here to help with your questions and issues.</p>
          <div class="suggestion-chips">
            <button class="chip" onclick="sendSuggestion('How do I reset my password?')" id="chip-1">🔑 Reset my password</button>
            <button class="chip" onclick="sendSuggestion('What are your business hours?')" id="chip-2">🕐 Business hours</button>
            <button class="chip" onclick="sendSuggestion('How do I track my order?')" id="chip-3">📦 Track my order</button>
            <button class="chip" onclick="sendSuggestion('I need to speak with a human agent')" id="chip-4">👤 Talk to a human</button>
          </div>
        </div>

        <!-- Messages are injected here by app.js -->
      </div>

      <!-- Typing indicator -->
      <div class="typing-container" id="typing-container" aria-hidden="true">
        <div class="typing-indicator" id="typing-indicator">
          <div class="avatar bot-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
          </div>
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="message-input"
            class="message-input"
            placeholder="Type your message..."
            rows="1"
            aria-label="Message input"
            maxlength="4000"
          ></textarea>
          <button
            class="send-btn"
            id="send-btn"
            onclick="sendMessage()"
            aria-label="Send message"
            disabled
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Press <kbd>Enter</kbd> to send, <kbd>Shift+Enter</kbd> for new line</p>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
